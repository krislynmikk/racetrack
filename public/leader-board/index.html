<!DOCTYPE html>
<html lang="en">
<head>

  <title>Leader Board</title>
  <link rel="stylesheet" href="/shared/styles.css" />
</head>
<body>

      <div id="tableContainer">Waiting for race...</div>
    </div>
  </div>

    <script src="/shared/navbar.js"></script>
    <script src="/leader-board/script.js"></script>

    createNavbar();
    </script>
    <script src="/shared/fullscreen.js"></script>
        <script>
        enableFullscreen('fsBtn');
        </script>
    
</body>
