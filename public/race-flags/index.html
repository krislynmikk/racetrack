<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Race Flags</title>
  <link rel="stylesheet" href="/shared/styles.css" />
  <style>
    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      position: relative;
    }

    #label {
      font-size: 48px;
      font-weight: bold;
      color: black;
      text-transform: uppercase;
    }

    #fsBtn {
      position: fixed;
      top: 70px;
      left: 10px;
      z-index: 1100;
      border: none;
      padding: 10px 14px;
      font-weight: bold;
      cursor: pointer;
      background: #1f6feb;
      color: white;
    }

    #fsBtn:hover {
      background: #388bfd;
    }

    .safe {
      background: #00c853;
    }

    .hazard {
      background: #ffd600;
    }

    .danger {
      background: #d50000;
      color: white;
    }

    .finish {
      background: repeating-linear-gradient(
        45deg,
        black,
        black 20px,
        white 20px,
        white 40px
      );
      color: black;
    }
  </style>
</head>
<body>
  <button id="fsBtn">Fullscreen</button>

  <div id="label">WAITING</div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/shared/navbar.js"></script>
  <script src="/shared/fullscreen.js"></script>
  <script src="/race-flags/script.js"></script>
  <script>
    createNavbar();
    enableFullscreen('fsBtn');
  </script>
</body>
</html>
