<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Front Desk</title>
  <link rel="stylesheet" href="/shared/styles.css" />
</head>
<body>
  <div class="container">
    <h1>Front Desk</h1>
    <p>Receptionist panel</p>

    <div class="panel">
      <h2>Sessions</h2>
      <button id="addSessionBtn" class="btn-blue">Add Session</button>
    </div>

    <div class="panel">
      <h2>Upcoming Sessions</h2>
      <div id="sessionsOutput">No sessions yet.</div>
    </div>
  </div>
  <script src="/shared/auth.js"></script>
  
    <script>
    createAuth('receptionist').then(() => {
      const script = document.createElement('script');
      script.src = '/front-desk/script.js';
      document.body.appendChild(script);
    });
  </script>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/front-desk/script.js"></script></body>
</html>
